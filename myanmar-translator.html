<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myanmar Live Translator</title>
  <style>
    :root {
      --ink: #16171a;
      --muted: #69707a;
      --line: #d9dee6;
      --panel: #ffffff;
      --wash: #f5f7fb;
      --blue: #255ec2;
      --blue-dark: #163f8c;
      --teal: #0d766e;
      --amber: #b66d00;
      --danger: #b42318;
      --shadow: 0 18px 46px rgba(31, 41, 55, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "YuGothic", "Noto Sans JP", "Noto Sans Myanmar", sans-serif;
      background:
        linear-gradient(180deg, rgba(37, 94, 194, .08), transparent 32%),
        var(--wash);
    }

    button,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px clamp(16px, 4vw, 42px);
      background: rgba(255, 255, 255, .86);
      border-bottom: 1px solid rgba(217, 222, 230, .86);
      backdrop-filter: blur(14px);
    }

    .brand {
      min-width: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .brand h1 {
      margin: 2px 0 0;
      font-size: clamp(21px, 3vw, 32px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 36px;
      padding: 6px 12px;
      color: var(--muted);
      background: #eef3fb;
      border: 1px solid #d9e4f5;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--teal);
    }

    .status.is-working .status-dot {
      background: var(--amber);
      box-shadow: 0 0 0 5px rgba(182, 109, 0, .13);
    }

    .status.is-error .status-dot {
      background: var(--danger);
    }

    .workspace {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(18px, 4vw, 42px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      min-height: 44px;
      padding: 8px 12px;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toggle-row {
      display: flex;
      align-items: end;
      gap: 8px;
    }

    .toggle-button,
    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--panel);
      font-weight: 900;
    }

    .toggle-button {
      flex: 1;
      padding: 8px 12px;
    }

    .toggle-button.is-active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .icon-button {
      width: 44px;
      padding: 0;
    }

    .icon-button svg {
      width: 19px;
      height: 19px;
      stroke-width: 2.2;
    }

    .has-icons .icon-fallback {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .panes {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .pane {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: min(58vh, 620px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pane-header,
    .pane-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .pane-footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .pane-title {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .action-row {
      display: flex;
      gap: 8px;
    }

    textarea,
    .translation {
      width: 100%;
      min-height: 100%;
      padding: clamp(16px, 3vw, 26px);
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: clamp(22px, 4vw, 42px);
      line-height: 1.45;
      letter-spacing: 0;
      resize: none;
    }

    .translation {
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Noto Sans Myanmar", "Myanmar Text", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .translation:empty::before {
      content: attr(data-placeholder);
      color: #9aa3af;
    }

    .notice {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .notice strong {
      color: var(--ink);
    }

    .history {
      margin-top: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .history-header h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .history-list {
      display: grid;
      gap: 10px;
      max-height: 340px;
      padding: 14px;
      overflow: auto;
    }

    .history-empty {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .history-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid #e5e9f0;
      border-radius: 8px;
      background: #fafbfe;
    }

    .history-main {
      display: grid;
      gap: 7px;
      min-width: 0;
      padding: 0;
      color: inherit;
      text-align: left;
      background: transparent;
      border: 0;
    }

    .history-source,
    .history-target {
      margin: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      line-height: 1.55;
    }

    .history-source {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .history-target {
      color: var(--ink);
      font-family: "Noto Sans Myanmar", "Myanmar Text", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px;
      font-weight: 800;
    }

    .history-meta {
      margin: 0;
      color: #8b95a3;
      font-size: 12px;
      font-weight: 800;
    }

    .history-actions {
      display: flex;
      align-items: start;
      gap: 8px;
    }

    @media (max-width: 820px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar,
      .panes {
        grid-template-columns: 1fr;
      }

      .pane {
        min-height: 38vh;
      }

      .history-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <p>Live Japanese / English to Myanmar</p>
        <h1>リアルタイム ミャンマー語翻訳</h1>
      </div>
      <div class="status" id="status" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="statusText">待機中</span>
      </div>
    </header>

    <main class="workspace">
      <section class="toolbar" aria-label="翻訳設定">
        <div class="field">
          <label for="sourceLang">入力言語</label>
          <select id="sourceLang">
            <option value="ja" selected>日本語</option>
            <option value="en">英語</option>
            <option value="ko">韓国語</option>
            <option value="zh-CN">中国語（簡体）</option>
            <option value="auto">自動検出</option>
          </select>
        </div>

        <div class="field">
          <label for="targetLang">翻訳先</label>
          <select id="targetLang">
            <option value="my" selected>ミャンマー語</option>
            <option value="ja">日本語</option>
            <option value="en">英語</option>
          </select>
        </div>

        <div class="field">
          <label>入力補助</label>
          <div class="toggle-row">
            <button class="toggle-button" id="liveToggle" type="button" aria-pressed="true">自動翻訳 ON</button>
            <button class="icon-button" id="micButton" type="button" title="音声入力" aria-label="音声入力">
              <span class="icon-fallback">Mic</span>
              <i data-lucide="mic" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </section>

      <section class="panes">
        <article class="pane">
          <div class="pane-header">
            <h2 class="pane-title">入力</h2>
            <div class="action-row">
              <button class="icon-button" id="clearButton" type="button" title="クリア" aria-label="クリア">
                <span class="icon-fallback">Clr</span>
                <i data-lucide="trash-2" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <textarea id="sourceText" rows="10" placeholder="ここに話す内容や文章を入力"></textarea>
          <div class="pane-footer">
            <span id="sourceCount">0文字</span>
            <span id="timerText">入力待ち</span>
          </div>
        </article>

        <article class="pane">
          <div class="pane-header">
            <h2 class="pane-title">表示</h2>
            <div class="action-row">
              <button class="icon-button" id="copyButton" type="button" title="コピー" aria-label="コピー">
                <span class="icon-fallback">Copy</span>
                <i data-lucide="copy" aria-hidden="true"></i>
              </button>
              <button class="icon-button" id="speakButton" type="button" title="読み上げ" aria-label="読み上げ">
                <span class="icon-fallback">Say</span>
                <i data-lucide="volume-2" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div class="translation" id="translatedText" data-placeholder="ဘာသာပြန်စာသား"></div>
          <div class="pane-footer">
            <span id="targetCount">0文字</span>
            <span>Myanmar Unicode</span>
          </div>
        </article>
      </section>

      <p class="notice" id="notice">
        <strong>通信が必要です。</strong> 公開翻訳サービスを使用します。社内利用や長時間運用では、安定した翻訳APIを接続してください。
      </p>

      <section class="history" aria-label="翻訳履歴">
        <div class="history-header">
          <h2>翻訳履歴</h2>
          <button class="icon-button" id="clearHistoryButton" type="button" title="履歴を全削除" aria-label="履歴を全削除">
            <span class="icon-fallback">Clear</span>
            <i data-lucide="list-x" aria-hidden="true"></i>
          </button>
        </div>
        <div class="history-list" id="historyList">
          <p class="history-empty">翻訳するとここに履歴が残ります。</p>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    if (window.lucide) {
      window.lucide.createIcons();
      document.body.classList.add("has-icons");
    }

    const sourceText = document.getElementById("sourceText");
    const translatedText = document.getElementById("translatedText");
    const sourceLang = document.getElementById("sourceLang");
    const targetLang = document.getElementById("targetLang");
    const liveToggle = document.getElementById("liveToggle");
    const micButton = document.getElementById("micButton");
    const clearButton = document.getElementById("clearButton");
    const copyButton = document.getElementById("copyButton");
    const speakButton = document.getElementById("speakButton");
    const clearHistoryButton = document.getElementById("clearHistoryButton");
    const historyList = document.getElementById("historyList");
    const statusBox = document.getElementById("status");
    const statusText = document.getElementById("statusText");
    const sourceCount = document.getElementById("sourceCount");
    const targetCount = document.getElementById("targetCount");
    const timerText = document.getElementById("timerText");
    const notice = document.getElementById("notice");

    const historyStorageKey = "myanmarTranslatorHistory";
    const maxHistoryItems = 50;
    let debounceTimer;
    let abortController;
    let liveTranslation = true;
    let recognition;
    let translationHistory = [];

    const setStatus = (message, mode = "ready") => {
      statusText.textContent = message;
      statusBox.classList.toggle("is-working", mode === "working");
      statusBox.classList.toggle("is-error", mode === "error");
    };

    const updateCounts = () => {
      sourceCount.textContent = `${sourceText.value.length}文字`;
      targetCount.textContent = `${translatedText.textContent.length}文字`;
    };

    const setTranslation = (text) => {
      translatedText.textContent = text;
      updateCounts();
    };

    const loadHistory = () => {
      try {
        translationHistory = JSON.parse(localStorage.getItem(historyStorageKey)) || [];
      } catch (error) {
        translationHistory = [];
      }
    };

    const saveHistory = () => {
      localStorage.setItem(historyStorageKey, JSON.stringify(translationHistory));
    };

    const formatTime = (dateValue) => {
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(dateValue));
    };

    const renderHistory = () => {
      historyList.innerHTML = "";

      if (translationHistory.length === 0) {
        const empty = document.createElement("p");
        empty.className = "history-empty";
        empty.textContent = "翻訳するとここに履歴が残ります。";
        historyList.append(empty);
        return;
      }

      translationHistory.forEach((item) => {
        const row = document.createElement("article");
        row.className = "history-item";

        const main = document.createElement("button");
        main.className = "history-main";
        main.type = "button";
        main.setAttribute("aria-label", "履歴を入力欄に戻す");

        const source = document.createElement("p");
        source.className = "history-source";
        source.textContent = item.sourceText;

        const target = document.createElement("p");
        target.className = "history-target";
        target.textContent = item.translatedText;

        const meta = document.createElement("p");
        meta.className = "history-meta";
        meta.textContent = `${formatTime(item.createdAt)} / ${item.sourceLang} -> ${item.targetLang}`;

        main.append(source, target, meta);
        main.addEventListener("click", () => {
          sourceText.value = item.sourceText;
          sourceLang.value = item.sourceLang;
          targetLang.value = item.targetLang;
          setTranslation(item.translatedText);
          updateCounts();
          setStatus("履歴を表示");
          timerText.textContent = "履歴";
        });

        const actions = document.createElement("div");
        actions.className = "history-actions";

        const copy = document.createElement("button");
        copy.className = "icon-button";
        copy.type = "button";
        copy.title = "履歴をコピー";
        copy.setAttribute("aria-label", "履歴をコピー");
        copy.innerHTML = '<span class="icon-fallback">Copy</span><i data-lucide="copy" aria-hidden="true"></i>';
        copy.addEventListener("click", async () => {
          await navigator.clipboard.writeText(item.translatedText);
          setStatus("履歴をコピー済み");
        });

        const remove = document.createElement("button");
        remove.className = "icon-button";
        remove.type = "button";
        remove.title = "履歴を削除";
        remove.setAttribute("aria-label", "履歴を削除");
        remove.innerHTML = '<span class="icon-fallback">Delete</span><i data-lucide="x" aria-hidden="true"></i>';
        remove.addEventListener("click", () => {
          translationHistory = translationHistory.filter((entry) => entry.id !== item.id);
          saveHistory();
          renderHistory();
          setStatus("履歴を削除");
        });

        actions.append(copy, remove);
        row.append(main, actions);
        historyList.append(row);
      });

      if (window.lucide) {
        window.lucide.createIcons();
      }
    };

    const addHistory = (sourceValue, translatedValue) => {
      const normalizedSource = sourceValue.trim();
      const normalizedTarget = translatedValue.trim();

      if (!normalizedSource || !normalizedTarget) {
        return;
      }

      const duplicate = translationHistory.find((item) => (
        item.sourceText === normalizedSource &&
        item.translatedText === normalizedTarget &&
        item.sourceLang === sourceLang.value &&
        item.targetLang === targetLang.value
      ));

      if (duplicate) {
        duplicate.createdAt = new Date().toISOString();
        translationHistory = [
          duplicate,
          ...translationHistory.filter((item) => item.id !== duplicate.id)
        ];
      } else {
        translationHistory.unshift({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          sourceText: normalizedSource,
          translatedText: normalizedTarget,
          sourceLang: sourceLang.value,
          targetLang: targetLang.value,
          createdAt: new Date().toISOString()
        });
      }

      translationHistory = translationHistory.slice(0, maxHistoryItems);
      saveHistory();
      renderHistory();
    };

    const buildUrl = (text) => {
      const source = sourceLang.value === "auto" ? "auto" : sourceLang.value;
      const target = targetLang.value;
      const pair = `${source}|${target}`;
      const query = new URLSearchParams({
        q: text,
        langpair: pair
      });

      return `https://api.mymemory.translated.net/get?${query.toString()}`;
    };

    const translateNow = async () => {
      const text = sourceText.value.trim();

      if (!text) {
        setTranslation("");
        timerText.textContent = "入力待ち";
        setStatus("待機中");
        return;
      }

      if (sourceLang.value === targetLang.value) {
        setTranslation(text);
        addHistory(text, text);
        timerText.textContent = "同一言語";
        setStatus("表示中");
        return;
      }

      if (abortController) {
        abortController.abort();
      }

      abortController = new AbortController();
      setStatus("翻訳中", "working");
      timerText.textContent = "翻訳中";

      try {
        const response = await fetch(buildUrl(text), {
          signal: abortController.signal
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const translated = data.responseData && data.responseData.translatedText;

        if (!translated) {
          throw new Error("No translated text");
        }

        setTranslation(translated);
        addHistory(text, translated);
        setStatus("翻訳済み");
        timerText.textContent = "自動更新";
        notice.innerHTML = "<strong>翻訳済み。</strong> 表示内容をコピー、読み上げ、履歴から再表示できます。";
      } catch (error) {
        if (error.name === "AbortError") {
          return;
        }

        setStatus("通信エラー", "error");
        timerText.textContent = "再試行待ち";
        notice.innerHTML = "<strong>翻訳できませんでした。</strong> ネットワーク接続または公開翻訳サービスの制限を確認してください。";
      }
    };

    const scheduleTranslation = () => {
      updateCounts();
      clearTimeout(debounceTimer);

      if (!liveTranslation) {
        timerText.textContent = "自動OFF";
        return;
      }

      timerText.textContent = "待機中";
      debounceTimer = setTimeout(translateNow, 650);
    };

    sourceText.addEventListener("input", scheduleTranslation);
    sourceLang.addEventListener("change", translateNow);
    targetLang.addEventListener("change", translateNow);

    liveToggle.addEventListener("click", () => {
      liveTranslation = !liveTranslation;
      liveToggle.classList.toggle("is-active", liveTranslation);
      liveToggle.setAttribute("aria-pressed", String(liveTranslation));
      liveToggle.textContent = liveTranslation ? "自動翻訳 ON" : "自動翻訳 OFF";

      if (liveTranslation) {
        translateNow();
      } else {
        setStatus("停止中");
        timerText.textContent = "自動OFF";
      }
    });

    clearButton.addEventListener("click", () => {
      sourceText.value = "";
      setTranslation("");
      updateCounts();
      setStatus("待機中");
      timerText.textContent = "入力待ち";
      sourceText.focus();
    });

    copyButton.addEventListener("click", async () => {
      const text = translatedText.textContent.trim();

      if (!text) {
        return;
      }

      await navigator.clipboard.writeText(text);
      setStatus("コピー済み");
    });

    clearHistoryButton.addEventListener("click", () => {
      translationHistory = [];
      saveHistory();
      renderHistory();
      setStatus("履歴を全削除");
    });

    speakButton.addEventListener("click", () => {
      const text = translatedText.textContent.trim();

      if (!text || !("speechSynthesis" in window)) {
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = targetLang.value === "my" ? "my-MM" : targetLang.value;
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
      setStatus("読み上げ中");
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = "ja-JP";

      recognition.addEventListener("result", (event) => {
        let transcript = "";

        for (let index = event.resultIndex; index < event.results.length; index += 1) {
          transcript += event.results[index][0].transcript;
        }

        sourceText.value = transcript;
        scheduleTranslation();
      });

      recognition.addEventListener("end", () => {
        micButton.classList.remove("is-active");
      });

      micButton.addEventListener("click", () => {
        const active = micButton.classList.toggle("is-active");

        if (active) {
          recognition.lang = sourceLang.value === "en" ? "en-US" : sourceLang.value === "ko" ? "ko-KR" : sourceLang.value === "zh-CN" ? "zh-CN" : "ja-JP";
          recognition.start();
          setStatus("音声入力中", "working");
        } else {
          recognition.stop();
          setStatus("待機中");
        }
      });
    } else {
      micButton.disabled = true;
      micButton.title = "このブラウザでは音声入力を利用できません";
    }

    liveToggle.classList.add("is-active");
    loadHistory();
    renderHistory();
    updateCounts();
  </script>
</body>
</html>
